name: Update WM 2026 Results

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:          # manual trigger via Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch results and update data.json
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scripts/fetch_results.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update WM results [skip ci]"
          git push
